><b>文化/信仰：</b>${{s.faith}}<br><span class="popup-muted">坐标：${{s.lat.toFixed(5)}}, ${{s.lon.toFixed(5)}}</span>${{url}}`;}}schools.forEach(s=>{{const m=L.marker([s.lat,s.lon],{{icon:icon(s.color)}}).bindPopup(popup(s));m.meta=s;m.on('click',()=>{{select(s.id,true);parent.postMessage({{type:'school-selected',id:s.id}},'*');}});m.addTo(map);markerObjs.set(s.id,m);}});function visibleSchools(filter){{return schools.filter(s=>(filter.district==='all'||s.district===filter.district)&&(filter.type==='all'||s.type===filter.type)&&(!filter.query||(s.name+' '+s.address+' '+s.holder).toLowerCase().includes(filter.query.toLowerCase())));}}function applyFilter(filter,fit=true){{markerObjs.forEach(m=>map.removeLayer(m));const visible=visibleSchools(filter);visible.forEach(s=>markerObjs.get(s.id).addTo(map));if(visible.length){{if(!visible.find(s=>s.id===activeId))activeId=visible[0].id;updateIcons();if(fit)map.fitBounds(L.latLngBounds(visible.map(s=>[s.lat,s.lon])).pad(.12));}}parent.postMessage({{type:'filter-result',ids:visible.map(s=>s.id)}},'*');}}function select(id,open=false){{activeId=id;updateIcons();const m=markerObjs.get(id);const s=schools.find(x=>x.id===id);if(m&&s){{map.setView([s.lat,s.lon],16);if(open)m.openPopup();}}}}function updateIcons(){{schools.forEach(s=>{{const m=markerObjs.get(s.id);if(m)m.setIcon(icon(s.color,s.id===activeId));}})}}window.addEventListener('message',e=>{{const msg=e.data||{{}};if(msg.type==='filter')applyFilter(msg.filter,msg.fit!==false);if(msg.type==='select')select(msg.id,true);}});setTimeout(()=>{{const bounds=L.latLngBounds(schools.map(s=>[s.lat,s.lon]));map.fitBounds(bounds.pad(.08));}},200);</script></body></html>
